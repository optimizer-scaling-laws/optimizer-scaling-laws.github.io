<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="author" content="{{ site.author }}">
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">

  <!-- Open Graph for sharing -->
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  {% if page.image %}<meta property="og:image" content="{{ site.url }}{{ page.image | relative_url }}">{% endif %}

  <!-- Twitter cards -->
  <meta name="twitter:card" content="{% if page.image %}summary_large_image{% else %}summary{% endif %}">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  {% if page.image %}<meta name="twitter:image" content="{{ site.url }}{{ page.image | relative_url }}">{% endif %}

  <link rel="stylesheet" href="{{ '/assets/css/blog.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}" class="site-title">Optimizer-Induced Spectral Scaling Laws</a>
      <span class="nav-links">
        <a href="{{ '/' | relative_url }}">Project</a>
        <a href="{{ '/blog/' | relative_url }}" target="_blank" rel="noopener noreferrer">Blog</a>
        <a href="https://arxiv.org/abs/2605.21803">Paper</a>
        <a href="https://github.com/optimizer-scaling-laws/spectral-scaling-laws">Code</a>
      </span>
    </nav>
  </header>

  <main class="site-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>&copy; {{ site.time | date: '%Y' }} {{ site.author }}. Project page uses the <a href="https://nerfies.github.io">Nerfies</a> template.</p>
  </footer>
</body>
</html>
